#Initializing the extent report
extent.reporter.spark.start=true 
extent.reporter.spark.out=Reports/CreateGroup.html

#Ceating a folder called ?Screenshots? were screenshots should be saved and set the relative path
screenshot.dir=Screenshots/
screenshot.rel.path=../Screenshots/

#creating a base folder for the report, with the name ?test-output/SparkReport? and using the date pattern ?DD-MM-YY?
basefolder.name=test-output/SparkReport
basefolder.datetimepattern=d-MM-YY
